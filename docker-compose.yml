services:

  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8001:8000"

    env_file:
      - .env

    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: intranet_db
      JWT_SECRET: gys-intranet-secret-key-2024
      LDAP_ENABLED: "true"
      LDAP_TLS_REJECT_UNAUTHORIZED: "false"
      LDAP_SEARCH_BASE: DC=gyssteel,DC=com

    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"

    environment:
      REACT_APP_BACKEND_URL: http://172.16.31.48:8001
      WDS_SOCKET_PORT: "0"
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      FAST_REFRESH: "false"

    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  mongodb_data:
    external: true
    name: gys-intranet_mongodb_data
