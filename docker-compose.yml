services:
  # Database MongoDB
  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  # Backend API
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=intranet_db
      - JWT_SECRET=gys-intranet-secret-key-2024
    depends_on:
      - mongodb

  # Frontend Web
# Frontend Web
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # 1. Nama harus REACT_APP_BACKEND_URL
      # 2. Gunakan IP Server GYS (jangan localhost)
      # 3. JANGAN tambahkan /api di ujungnya
      - REACT_APP_BACKEND_URL=http://172.16.21.48:8000
    depends_on:
      - backend
    stdin_open: true
    tty: true
volumes:
  mongodb_data:
